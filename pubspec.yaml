name: abra_vendor_app
description: Abra Global Shipping - Vendor Portal
publish_to: 'none'
version: 1.0.0+28

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  firebase_messaging: ^15.2.0
  # firebase_analytics removed — Swift plugin incompatible with iOS 26
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.6.3
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # Google Sign In
  google_sign_in: ^6.2.2
  
  # Apple Sign In
  sign_in_with_apple: ^7.0.1
  
  # Storage
  shared_preferences: ^2.3.3
  
  # HTTP & API
  dio: ^5.7.0
  http: ^1.2.2
  
  # File Handling
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  
  # Barcode Scanning
  mobile_scanner: ^6.0.2
  
  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # Local notifications (foreground push on Android + iOS)
  flutter_local_notifications: ^18.0.1

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  crypto: ^3.0.6
  intl: ^0.19.0
  tutorial_coach_mark: ^1.2.11

  # facebook_app_events removed — incompatible with iOS 26 (crashes in swift_getObjectType)
  # app_tracking_transparency removed — incompatible with iOS 26 (crashes in swift_getObjectType)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
