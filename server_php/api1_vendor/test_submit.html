<!DOCTYPE html>
<html>
<head>
    <title>Test KYC Submit</title>
</head>
<body>
    <h1>Test KYC Submission</h1>
    <button onclick="testSubmit()">Test Submit KYC</button>
    <pre id="result"></pre>

    <script>
    async function testSubmit() {
        const data = {
            firebase_uid: 'test_uid_123',
            account_type: 'individual',
            name: 'Test Vendor',
            email: 'test@example.com',
            phone: '1234567890',
            aadhaar_number: '123456789012',
            pan_number: 'ABCDE1234F',
            bank_account_name: 'Test Account',
            bank_account_number: '1234567890',
            ifsc_code: 'ABCD0123456',
            aadhaar_doc: 'test/path/aadhaar.jpg',
            pan_doc: 'test/path/pan.jpg',
            photo_doc: 'test/path/photo.jpg',
            bank_account_photo: 'test/path/bank.jpg'
        };

        try {
            const response = await fetch('https://crm.abra-logistic.com/api1/vendor/submit_kyc.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById('result').textContent = JSON.stringify(result, null, 2);
        } catch (error) {
            document.getElementById('result').textContent = 'Error: ' + error;
        }
    }
    </script>
</body>
</html>
